# Configuration pour Home Assistant (REST Sensor)
# À copier dans votre fichier configuration.yaml ou dans un fichier inclus.

sensor:
  - platform: rest
    name: Rappel Conso Alerte
    # Cette URL recherche les termes "fromage" ou "charcuterie". 
    # Vous pouvez modifier les termes dans la clause search() ci-dessous.
    # Note: Les espaces et caractères spéciaux sont encodés pour l'URL.
    resource: "https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/rappelconso0/records?limit=5&order_by=date_de_publication%20DESC&where=search(libelle%2C%20%22fromage%22)%20or%20search(libelle%2C%20%22charcuterie%22)"
    scan_interval: 3600 # Mise à jour toutes les heures
    value_template: "{{ value_json.total_count }}"
    json_attributes:
      - results
    headers:
      Content-Type: application/json
