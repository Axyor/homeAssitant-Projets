type: vertical-stack
cards:
  - type: custom:mushroom-template-card
    entity: sensor.rappel_conso_cible
    primary: >-
      {% set count = states('sensor.rappel_conso_cible') | int(0) %} {% if count
      > 0 %}ALERTE : {{ count }} RAPPEL(S){% else %}Rappel Conso : RAS{% endif
      %}
    secondary: >-
      {% set new = state_attr('sensor.rappel_conso_cible', 'new_count') |
      default(0) | int %} {% if new > 0 %}🆕 {{ new }} nouveau(x) ! {% elif
      states('sensor.rappel_conso_cible') | int(0) > 0 %}Surveillance active {%
      else %}Aucun rappel {% endif %}
    icon: >-
      {% if states('sensor.rappel_conso_cible') | int(0) > 0
      %}mdi:alert-decagram {% else %}mdi:shield-check {% endif %}
    tap_action:
      action: more-info
    color: >-
      {% if state_attr('sensor.rappel_conso_cible', 'new_count') | default(0) |
      int > 0 %}red {% elif states('sensor.rappel_conso_cible') | int(0) > 0
      %}orange {% else %}green {% endif %}
    features_position: bottom
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        entity: sensor.rappel_conso_cible
        icon: mdi:magnify
        icon_color: grey
        content: >-
          {% set kw = state_attr('sensor.rappel_conso_cible', 'keywords_used')
          | default([], true) %} {% if kw is iterable and kw | length > 0 %}{{
          kw | length }} mots-clés{% else %}aucun{% endif %}
        tap_action:
          action: more-info
      - type: template
        entity: sensor.rappel_conso_cible
        icon: mdi:clock-outline
        icon_color: grey
        content: >-
          {% set lu = state_attr('sensor.rappel_conso_cible', 'last_update') %}
          {{ as_timestamp(lu, 0) | timestamp_custom('%d/%m %H:%M') if lu else
          'Jamais' }}
        tap_action:
          action: more-info
  - type: markdown
    content: >-
      {% set count = states('sensor.rappel_conso_cible') | int(0) %} {% if count
      > 0 %} {% set data = state_attr('sensor.rappel_conso_cible', 'data') %} {%
      if data %} {% set ns = namespace(seen=[]) %}
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;">
      {% for item in data %} {% if
      item.numero_fiche not in ns.seen %} {% set ns.seen = ns.seen +
      [item.numero_fiche] %}
      <a href="{{ item.url | default('#', true) }}"
      target="_blank" style="text-decoration: none; color:
      var(--primary-text-color); display: block;">
      <div style="display: flex;
      align-items: flex-start; gap: 12px; padding: 12px;
      border-radius: 12px; border: 1px solid var(--divider-color);
      background: var(--card-background-color);
      transition: transform 0.15s ease, box-shadow 0.15s ease; height: 100%; box-sizing: border-box;">
      {% if item.image_url %}
      <img src="{{ item.image_url }}" style="width: 75px;
      height: 75px; min-width: 75px; min-height: 75px; max-width: 75px;
      max-height: 75px; object-fit: cover; overflow: hidden; border-radius: 6px;
      background: white; padding: 2px; flex-shrink: 0; border: 1px solid
      var(--divider-color);"> {%
      else %} <div style="width: 75px; height: 75px; border-radius: 6px;
      background: rgba(150,150,150,0.1); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; border: 1px solid
      var(--divider-color);"> <ha-icon icon="mdi:image-off-outline"
      style="color: var(--secondary-text-color);"></ha-icon> </div> {% endif %}
      <div style="flex: 1; min-width: 0;"> <div style="font-weight: 600;
      font-size: 1.05em; line-height: 1.2; margin-bottom: 6px; display:
      -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; text-overflow: ellipsis;"> {{ item.titre | replace('•',
      '') | replace('\t', ' ') | trim | capitalize }} </div> <div
      style="font-size: 0.9em; line-height: 1.3;"> <span style="color:
      var(--error-color); font-weight: bold;">{{ item.marque | default('MARQUE
      INCONNUE', true) | upper }}</span><br/> <span style="color:
      var(--secondary-text-color);">⚠️ {{ item.motif | default('Motif non
      précisé', true) | truncate(90, true) }}</span> </div> </div> </div> </a>
      {% endif %} {% endfor %}
      </div>
      {% endif %} {% else %} <div style="text-align:
      center; padding: 24px 0;"> <ha-icon icon="mdi:shield-check"
      style="--mdc-icon-size: 48px; color: var(--success-color);"></ha-icon>
      <div style="font-size: 1.2em; font-weight: bold; margin-top: 12px; color:
      var(--primary-text-color);">Aucun rappel détecté</div> <div style="color:
      var(--secondary-text-color); font-size: 0.95em; margin-top: 4px;">Vos
      produits surveillés semblent sûrs pour le moment.</div> </div> {% endif %}
