type: vertical-stack
cards:
  - type: custom:mushroom-template-card
    entity: sensor.water_quality
    primary: >-
      Qualité de l'eau : {{ state_attr('sensor.water_quality', 'commune_name')
      }}
    secondary: "{{ state_attr('sensor.water_quality', 'conclusion') }}"
    multiline_secondary: true
    icon: |-
      {% if is_state('sensor.water_quality', 'Compliant') %}
        mdi:water-check
      {% else %}
        mdi:water-alert
      {% endif %}
    icon_color: |-
      {% if is_state('sensor.water_quality', 'Compliant') %}
        green
      {% else %}
        red
      {% endif %}
    tap_action:
      action: more-info
  - type: markdown
    content: >-
      {% set date_str = state_attr('sensor.water_quality', 'sampling_date') %}

      **📅 Prélèvement :** {{ as_timestamp(date_str) |
      timestamp_custom('%d/%m/%Y', true) if date_str else 'Inconnu' }}


      **💧 Réseau :** {{ state_attr('sensor.water_quality', 'network') |
      default('Inconnu', true) }}


      ---


      | Paramètre | Résultat |

      | :--- | :--- |

      | 🦠 **Bactériologie** | {{ state_attr('sensor.water_quality',
      'bact_compliance') | default('?', true) }} |

      | 🧪 **Physico-chimie** | {{ state_attr('sensor.water_quality',
      'pc_compliance') | default('?', true) }} |

      | 🪨 **Calcaire** | {{ state_attr('sensor.water_quality', 'hardness') |
      default('?', true) }} |

      | 🍼 **Nitrates** | {{ state_attr('sensor.water_quality', 'nitrates') |
      default('?', true) }} |

      | ⚖️ **pH** | {{ state_attr('sensor.water_quality', 'ph') | default('?',
      true) }} |
